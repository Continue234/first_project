name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
    paths:
      - 'linux-command/**'
      - '.github/workflows/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'linux-command/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout 代码
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: 'linux-command/package-lock.json'

      - name: 安装依赖
        working-directory: ./linux-command
        run: npm ci

      - name: 运行测试（可选）
        working-directory: ./linux-command
        run: npm test

      - name: 构建项目
        working-directory: ./linux-command
        run: npm run build

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5

      - name: 上传构建产物
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./linux-command/dist        # ←←← 如果你的输出目录不是 dist，请修改这里！

      - name: 部署到 GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
